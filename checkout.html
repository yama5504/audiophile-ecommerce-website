<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32x32.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Mentor | Audiophile e-commerce website</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  </head>
  <body>
    <header id="header">
      <p>
  Home
  Headphones
  Speakers
  Earphones
      </p>
    </header>

    <main class="checkout-page">

        <div class="wrap">
            
            <p class="breadcrumbs">
                <a href="#" onclick="history.back(); return false;">Go Back</a>
            </p>

            <form id="checkout-form">
                <div class="form-inner">
                    <h1>CHECKOUT</h1>
                    <div class="form-group">
                        <h3>BILLING DETAILS</h3>
                        <div class="input-contents">
                            <div class="input-wrap">
                                <label for="">Name</label>
                                <input type="text" id="name" placeholder="Alexei Ward" required>
                            </div>
                            <div class="input-wrap">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" placeholder="alex@mail.com" required> 
                            </div>
                            <div class="input-wrap">
                                <label for="tel">Phone Number</label>
                                <input type="tel" id="tel" placeholder="+1 202-555-0136" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <h3>SHIPPING INFO</h3>
                        <div class="input-contents">
                            <div class="input-wrap is-wide">
                                <label for="">Your Address</label>
                                <input type="" id="" placeholder="1137 Williams Avenue">
                            </div>
                            <div class="input-wrap">
                                <label for="">ZIP Code</label>
                                <input type="" id="" placeholder="10001">
                            </div>
                            <div class="input-wrap">
                                <label for="">City</label>
                                <input type="" id="" placeholder="New York">
                            </div>
                            <div class="input-wrap">
                                <label for="">Country</label>
                                <input type="" id="" placeholder="United States">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <h3>PAYMENT DETAILS</h3>
                        <div class="input-contents">
                            <div class="input-wrap is-wide pay-method">
                                <p class="input-label">Payment Method</p>

                                <div class="radio-wrap">
                                    <div class="radio-item">
                                        <input type="radio" name="payment" id="pay-emoney" value="e-money" checked>
                                        <label for="pay-emoney">e-Money</label>
                                    </div>
                                    <div class="radio-item">
                                        <input type="radio" name="payment" id="pay-cash" value="cash">
                                        <label for="pay-cash">Cash on Delivery</label>
                                    </div>
                                </div>

                            </div>
                            <div class="input-wrap">
                                <label for="tel">e-Money Number</label>
                                <input type="tel" id="" placeholder="238521993" required>
                            </div>
                            <div class="input-wrap">
                                <label for="tel">e-Money PIN</label>
                                <input type="tel" id="" placeholder="6891" required>
                            </div>
                        </div>
                    </div>
                </div>

                <aside class="summary">
                    <h2>SUMMARY</h2>
                    <div class="summary-inner"></div>
                </aside>
            </form>

        </div>

    </main>

    <div class="thanks-modal">
        <div class="thanks-content">
            <div class="check-icon">
                <img src="/assets/images/checkout/icon-order-confirmation.svg" alt="">
            </div>
            <h2>THANK YOU <br>FOR YOUR ORDER</h2>
            <p class="thanks-msg">You will receive an email confirmation shortly.</p>
            
            <div class="order-summary-box">
                <div class="items-side">
                    <div id="thanks-item-list"></div>
                    <div class="other-items">
                        <p>and <span id="other-count">0</span> other item(s)</p>
                    </div>
                </div>
                <div class="total-side">
                    <p class="total-label">GRAND TOTAL</p>
                    <p class="total-price">$ <span id="thanks-total">0</span></p>
                </div>
            </div>
            
            <a href="/audiophile-ecommerce-website/" class="cv-btn back-home-btn">BACK TO HOME</a>
        </div>
    </div>
    <div class="thanks-overlay"></div>

    <footer id="footer"></footer>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
